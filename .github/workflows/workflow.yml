name: Build and deploy to GCP

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_URL: ${{ vars.GC_REGION }}-docker.pkg.dev/${{ vars.GC_PROJECT_ID }}/cloud-run-source-deploy/${{ vars.GC_REPO_NAME }}/${{ vars.GC_SERVICE_NAME }}:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - id: "auth"
        name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker
        run: gcloud auth configure-docker ${{ vars.GC_REGION }}-docker.pkg.dev

      - name: Ensure Artifact Repository exists
        run: |
          gcloud artifacts repositories describe ${{ vars.GC_REPO_NAME }} \
            --location=${{ vars.GC_REGION }} || \
          gcloud artifacts repositories create ${{ vars.GC_REPO_NAME }} \
            --repository-format=docker \
            --location=${{ vars.GC_REGION }}

      - name: Docker Build
        run: docker build --no-cache -t ${{ env.IMAGE_URL }} ./backend -f ./backend/Dockerfile

      - name: Docker Push
        run: docker push ${{ env.IMAGE_URL }}

      - name: Update Cloud Run service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          region: ${{ vars.GC_REGION }}
          service: ${{ vars.GC_SERVICE_NAME }}
          image: ${{ env.IMAGE_URL }}
          env_vars: |
            DB_URL=${{ vars.DB_URL }}
            DB_USER=${{ vars.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
